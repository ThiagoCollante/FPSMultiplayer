<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proper 3D Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #room-info { position: absolute; top: 15px; left: 15px; color: #00ffcc; text-shadow: 1px 1px 2px #000; font-weight: bold; font-size: 1.2rem; }
        
        #health-container { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 30px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 5px; overflow: hidden; }
        #health-bar { height: 100%; width: 100%; background: #00ffcc; transition: width 0.2s, background-color 0.2s; }
        #health-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; color: white; font-size: 5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 10px; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 5; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); opacity: 0.8; transition: opacity 0.2s; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffcc; }
        #crosshair::before { top: 0; left: 9px; width: 2px; height: 20px; }
        #crosshair::after { top: 9px; left: 0; width: 20px; height: 2px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; pointer-events: auto; }
        .menu-box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; border: 1px solid #333; width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        .btn { padding: 12px 20px; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn:hover { background: #00ccaa; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-danger:hover { background: #cc0000; }

        #main-menu { background: rgba(15, 20, 25, 1); }
        #main-menu h1 { font-size: 3.5rem; color: #00ffcc; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; }
        .input-group { display: flex; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 12px; border: none; background: #222; color: white; font-size: 1rem; border-radius: 4px 0 0 4px; outline: none; }
        .input-group .btn { margin-top: 0; width: auto; border-radius: 0 4px 4px 0; }
        
        .server-list { text-align: left; max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #444; padding-top: 15px; }
        .server-item { display: flex; justify-content: space-between; background: #2a2a35; padding: 10px 15px; margin-bottom: 8px; border-radius: 4px; align-items: center; }
        .server-item .btn { width: auto; padding: 6px 12px; margin-top: 0; font-size: 0.9rem; }

        #pause-menu { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: none; }
        #pause-menu h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.2rem; color: #aaa; }
        .data-row span { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="room-info">Room: <span id="current-room-name">...</span></div>
        <div id="crosshair"></div>
        <div id="health-container">
            <div id="health-bar"></div>
            <div id="health-text">100 HP</div>
        </div>
    </div>

    <div id="death-screen">Wasted</div>

    <div id="main-menu" class="overlay">
        <h1>FPS Arena</h1>
        <div class="menu-box">
            <h3>Create a Room</h3>
            <div class="input-group">
                <input type="text" id="new-room-input" placeholder="Enter Room Name...">
                <button class="btn" id="create-room-btn">Create</button>
            </div>
            <h3>Active Servers</h3>
            <div class="server-list" id="server-list"></div>
        </div>
    </div>

    <div id="pause-menu" class="overlay">
        <div class="menu-box">
            <h2>Game Paused</h2>
            <div class="data-row">Room: <span id="pause-room-display">...</span></div>
            <div class="data-row">Players: <span id="pause-players-display">1</span></div>
            <button class="btn" id="resume-btn">Resume Game</button>
            <button class="btn btn-danger" id="leave-btn">Leave Room</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';
        import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6;
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);
        
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        
        const gridHelper = new THREE.GridHelper(100, 100, 0x00ffcc, 0x444455);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Assault Rifle Model ---
        function createGunModel() {
            const gunGroup = new THREE.Group();
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.7 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.2 });

            const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.4), gunMat);
            gunGroup.add(receiver);

            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.35, 12), metalMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0, 0.02, -0.35);
            gunGroup.add(barrel);

            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.08), darkMat);
            grip.rotation.x = -Math.PI / 10;
            grip.position.set(0, -0.12, 0.12);
            gunGroup.add(grip);

            const mag = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.1), darkMat);
            mag.rotation.x = Math.PI / 16;
            mag.position.set(0, -0.12, -0.05);
            gunGroup.add(mag);

            const stock = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.25), gunMat);
            stock.position.set(0, -0.02, 0.3);
            gunGroup.add(stock);

            // Sights
            const sightFront = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.04, 0.01), darkMat);
            sightFront.position.set(0, 0.08, -0.45);
            gunGroup.add(sightFront);
            const sightBack = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.02), darkMat);
            sightBack.position.set(0, 0.07, 0.1);
            gunGroup.add(sightBack);

            return gunGroup;
        }

        const myGun = createGunModel();
        camera.add(myGun);

        // --- UI & State ---
        const socket = io(); 
        const players = {}; 
        
        const mainMenu = document.getElementById('main-menu');
        const pauseMenu = document.getElementById('pause-menu');
        const uiLayer = document.getElementById('ui-layer');
        const serverListUI = document.getElementById('server-list');
        const newRoomInput = document.getElementById('new-room-input');
        const currentRoomNameUI = document.getElementById('current-room-name');
        
        const healthBar = document.getElementById('health-bar');
        const healthText = document.getElementById('health-text');
        const deathScreen = document.getElementById('death-screen');
        const crosshair = document.getElementById('crosshair');
        
        let inGame = false;
        let currentRoomString = "";
        let myHealth = 100;

        const controls = new PointerLockControls(camera, document.body);

        controls.addEventListener('unlock', () => {
            uiLayer.style.display = 'none';
            // Stop firing/aiming when paused
            isFiring = false; 
            isAiming = false;
            
            if (inGame) {
                pauseMenu.style.display = 'flex';
                document.getElementById('pause-room-display').innerText = currentRoomString;
                document.getElementById('pause-players-display').innerText = Object.keys(players).length + 1; 
            } else {
                mainMenu.style.display = 'flex';
            }
        });

        function updateMyHealth(hp) {
            myHealth = hp;
            healthBar.style.width = `${hp}%`;
            healthText.innerText = `${hp} HP`;
            healthBar.style.background = hp <= 30 ? '#ff4444' : '#00ffcc';
        }

        function enterGame(roomName) {
            if (!roomName.trim()) return;
            socket.emit('joinRoom', roomName);
            currentRoomString = roomName;
            currentRoomNameUI.innerText = roomName;
            
            inGame = true;
            updateMyHealth(100);
            mainMenu.style.display = 'none';
            pauseMenu.style.display = 'none';
            uiLayer.style.display = 'block';
            controls.lock(); 
        }

        document.getElementById('create-room-btn').addEventListener('click', () => enterGame(newRoomInput.value));
        document.getElementById('resume-btn').addEventListener('click', () => {
            pauseMenu.style.display = 'none';
            uiLayer.style.display = 'block';
            controls.lock();
        });
        
        document.getElementById('leave-btn').addEventListener('click', () => {
            socket.emit('leaveRoom');
            inGame = false;
            currentRoomString = "";
            for (let id in players) { scene.remove(players[id]); delete players[id]; }
            camera.position.set(0, 1.6, 0);
            pauseMenu.style.display = 'none';
            mainMenu.style.display = 'flex';
        });

        socket.on('availableRooms', (rooms) => {
            if (rooms.length === 0) {
                serverListUI.innerHTML = '<p style="color: #888; text-align: center;">No active rooms.</p>';
                return;
            }
            serverListUI.innerHTML = '';
            rooms.forEach(room => {
                const div = document.createElement('div');
                div.className = 'server-item';
                div.innerHTML = `<span><strong>${room.name}</strong> (${room.players})</span><button class="btn join-btn">Join</button>`;
                div.querySelector('.join-btn').addEventListener('click', () => enterGame(room.name));
                serverListUI.appendChild(div);
            });
        });

        function buildPlayerModel(id, color) {
            const group = new THREE.Group();
            group.userData = { id: id }; 
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 1), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 0.9;
            group.add(body);
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.3), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            visor.position.set(0, 1.5, -0.45);
            group.add(visor);
            return group;
        }

        socket.on('currentPlayers', (serverPlayers) => {
            for (let id in players) { scene.remove(players[id]); delete players[id]; } 
            for (let id in serverPlayers) {
                if (id === socket.id) { updateMyHealth(serverPlayers[id].health); continue; }
                addPlayer(serverPlayers[id]);
            }
        });

        socket.on('newPlayer', (p) => addPlayer(p));
        socket.on('playerMoved', (p) => {
            if (players[p.id]) {
                players[p.id].position.copy(p.position);
                players[p.id].rotation.y = p.rotation.y;
            }
        });
        socket.on('playerDisconnected', (id) => {
            if (players[id]) { scene.remove(players[id]); delete players[id]; }
        });

        socket.on('updateHealth', (data) => {
            if (data.id === socket.id) updateMyHealth(data.health);
        });

        socket.on('playerRespawned', (data) => {
            if (data.id === socket.id) return; 
            if (players[data.id]) {
                players[data.id].position.copy(data.position);
            }
        });

        socket.on('youDied', () => {
            deathScreen.style.opacity = '1';
            setTimeout(() => { deathScreen.style.opacity = '0'; }, 1500);
            updateMyHealth(100);
            velocity.set(0,0,0);
            camera.position.set(0, 1.6, 0);
        });

        socket.on('drawLaser', (data) => {
            if (players[data.fromId]) {
                const fromPos = new THREE.Vector3().copy(players[data.fromId].position);
                fromPos.y += 1.5; 
                createLaserVisual(fromPos, data.toPosition);
            }
        });

        function addPlayer(p) {
            const playerModel = buildPlayerModel(p.id, p.color);
            playerModel.position.copy(p.position);
            playerModel.rotation.y = p.rotation.y;
            scene.add(playerModel);
            players[p.id] = playerModel;
        }

        // --- NEW: Automatic Firing & ADS System ---
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0);

        let isFiring = false;
        let isAiming = false;
        let lastFireTime = 0;
        const fireRate = 100; // 100 milliseconds between shots (10 bullets per sec)

        // Gun Positions
        const hipPosition = new THREE.Vector3(0.25, -0.25, -0.4);
        const adsPosition = new THREE.Vector3(0, -0.12, -0.3); // Aligns iron sights to center
        
        // Smooth Recoil Trackers
        const recoilOffset = new THREE.Vector3(0, 0, 0);
        let recoilRotX = 0;

        function createLaserVisual(start, end) {
            const material = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
            const points = [start, new THREE.Vector3(end.x, end.y, end.z)];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            setTimeout(() => { scene.remove(line); }, 50); 
        }

        function fireGun() {
            if (!inGame || myHealth <= 0) return;

            // Apply Recoil (Kicks gun up and backward)
            recoilOffset.z += 0.04;
            recoilOffset.y += 0.01;
            recoilRotX += 0.05;

            // Cast Ray for Hit Detection
            raycaster.setFromCamera(centerScreen, camera);
            const hitTargets = [];
            for (let id in players) { hitTargets.push(players[id]); }
            
            const intersects = raycaster.intersectObjects(hitTargets, true);
            let hitPoint = null;

            if (intersects.length > 0) {
                hitPoint = intersects[0].point;
                let rootObject = intersects[0].object;
                while (rootObject.parent && rootObject.userData.id === undefined) {
                    rootObject = rootObject.parent;
                }
                if (rootObject.userData.id) {
                    socket.emit('registerHit', { targetId: rootObject.userData.id });
                }
            } else {
                raycaster.ray.at(50, hitPoint = new THREE.Vector3());
            }

            // Draw Local Laser
            const barrelTip = new THREE.Vector3(0, 0.02, -0.5); 
            myGun.localToWorld(barrelTip); // Convert local barrel tip to world space
            createLaserVisual(barrelTip, hitPoint);
            
            socket.emit('playerShot', { hitPoint: hitPoint });
        }

        // --- Mouse Inputs ---
        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked || !inGame) return;
            if (e.button === 0) isFiring = true; // Left Click
            if (e.button === 2) isAiming = true; // Right Click
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) isFiring = false;
            if (e.button === 2) isAiming = false;
        });

        // Prevent right-click menu from opening
        window.addEventListener('contextmenu', (e) => e.preventDefault());


        // --- Movement & Physics ---
        const moveState = { forward: false, backward: false, left: false, right: false };
        let canJump = false;
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        const gravity = 35.0; 

        document.addEventListener('keydown', (e) => {
            if (!controls.isLocked) return;
            if (e.code === 'KeyW') moveState.forward = true;
            if (e.code === 'KeyA') moveState.left = true;
            if (e.code === 'KeyS') moveState.backward = true;
            if (e.code === 'KeyD') moveState.right = true;
            if (e.code === 'Space' && canJump) {
                velocity.y = 12; 
                canJump = false;
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveState.forward = false;
            if (e.code === 'KeyA') moveState.left = false;
            if (e.code === 'KeyS') moveState.backward = false;
            if (e.code === 'KeyD') moveState.right = false;
        });

        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            // 1. Continuous Firing Logic
            if (isFiring && (time - lastFireTime > fireRate)) {
                fireGun();
                lastFireTime = time;
            }

            // 2. Gun Animation & Recoil Smoothing (LERP)
            const targetPos = isAiming ? adsPosition : hipPosition;
            
            // Smoothly decay recoil back to zero
            recoilOffset.lerp(new THREE.Vector3(0, 0, 0), 0.15);
            recoilRotX += (0 - recoilRotX) * 0.15;

            // Combine target position with the recoil offset
            myGun.position.copy(targetPos).lerp(myGun.position, 0.8).add(recoilOffset);
            myGun.rotation.x = recoilRotX;

            // Crosshair visibility
            crosshair.style.opacity = isAiming ? '0' : '0.8';


            // 3. Physics & Gravity
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= gravity * delta; 

            if (controls.isLocked) {
                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize(); 

                // Slightly slower movement when aiming down sights
                const speed = isAiming ? 25.0 : 50.0;
                if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * speed * delta;
            }

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            camera.position.y += (velocity.y * delta);

            if (camera.position.y < 1.6) {
                velocity.y = 0;
                camera.position.y = 1.6;
                canJump = true;
            }

            // 4. Network Sync
            if (inGame) {
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                const pureYaw = Math.atan2(-camDir.x, -camDir.z); 

                socket.emit('playerMovement', {
                    position: { x: camera.position.x, y: camera.position.y - 1.6, z: camera.position.z },
                    rotation: { y: pureYaw }
                });
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
