<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Render Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid black; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">Room: <span id="room-display">Connecting...</span></div>
    <div id="crosshair"></div>
    <div id="instructions"><h1>Click to Play</h1><p>(W,A,S,D to walk, Mouse to look)</p></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';
        import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";

        // --- 3D Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Environment
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(light);
        const grid = new THREE.GridHelper(200, 50, 0xffffff, 0x444444);
        scene.add(grid);

        // --- Controls ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');

        // --- Movement Logic ---
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- Networking ---
        const socket = io(); // Automatically connects to the Render host
        const otherPlayers = {};

        socket.on('connect', () => {
            const roomName = prompt("Enter Room ID:", "Lobby") || "Lobby";
            socket.emit('joinRoom', roomName);
            document.getElementById('room-display').innerText = roomName;
        });

        socket.on('updatePlayers', (serverPlayers) => {
            for (let id in serverPlayers) {
                if (id === socket.id) continue;
                
                if (!otherPlayers[id]) {
                    const mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 2, 1),
                        new THREE.MeshStandardMaterial({ color: serverPlayers[id].color })
                    );
                    scene.add(mesh);
                    otherPlayers[id] = mesh;
                }
                otherPlayers[id].position.copy(serverPlayers[id].position);
            }
            
            // Cleanup disconnected players
            for (let id in otherPlayers) {
                if (!serverPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            }
        });

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const speed = 0.15;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);

                // Send data to Render
                socket.emit('move', { x: camera.position.x, y: camera.position.y - 1.6, z: camera.position.z });
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
