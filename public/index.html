<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tactical Multiplayer FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10;}
        #room-info { position: absolute; top: 15px; left: 15px; color: #ece8e1; text-shadow: 1px 1px 2px #000; font-weight: bold; font-size: 1.2rem; }
        
        #health-container { position: absolute; bottom: 30px; left: 40px; width: 300px; height: 30px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 4px; overflow: hidden; }
        #health-bar { height: 100%; width: 100%; background: #00ffcc; transition: width 0.2s, background-color 0.2s; }
        #health-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 70, 85, 0.4); display: flex; justify-content: center; align-items: center; color: white; font-size: 5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 10px; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 20; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; transition: opacity 0.15s; }
        .ch-line { position: absolute; background-color: rgba(0, 255, 150, 0.9); box-shadow: 0 0 2px rgba(0,0,0,0.5); transition: all 0.05s ease-out; }
        #ch-top { top: 0; left: 14px; width: 2px; height: 10px; }
        #ch-bottom { bottom: 0; left: 14px; width: 2px; height: 10px; }
        #ch-left { top: 14px; left: 0; width: 10px; height: 2px; }
        #ch-right { top: 14px; right: 0; width: 10px; height: 2px; }
        #ch-center { top: 13px; left: 13px; width: 4px; height: 4px; background: rgba(0, 255, 150, 0.9); border-radius: 50%; }

        #ammo-counter { position: absolute; bottom: 30px; right: 40px; font-size: 2.5rem; color: white; font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); pointer-events: none; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 15; pointer-events: auto; }
        .menu-box { background: rgba(15, 20, 25, 0.95); padding: 30px; border-radius: 8px; border: 1px solid #333; width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); }
        .btn { padding: 12px 20px; background: #ff4655; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; width: 100%; margin-top: 10px; font-size: 1.1rem; text-transform: uppercase; }
        .btn:hover { background: #ff5866; }
        
        #main-menu { background: rgba(10, 15, 20, 1); }
        #main-menu h1 { font-size: 3.5rem; color: #ff4655; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        
        .input-group { display: flex; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 12px; border: none; background: #222; color: white; font-size: 1rem; border-radius: 4px 0 0 4px; outline: none; }
        .input-group .btn { margin-top: 0; width: auto; border-radius: 0 4px 4px 0; }
        
        .server-list { text-align: left; max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #444; padding-top: 15px; }
        .server-item { display: flex; justify-content: space-between; background: #2a2a35; padding: 10px 15px; margin-bottom: 8px; border-radius: 4px; align-items: center; }
        .server-item .btn { width: auto; padding: 6px 12px; margin-top: 0; font-size: 0.9rem; }

        #pause-menu { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); display: none; }
        #pause-menu h2 { font-size: 2.5rem; margin-bottom: 10px; color: #ff4655; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.2rem; color: #aaa; }
        .data-row span { color: #fff; font-weight: bold; }
        kbd { background: #333; color: #fff; padding: 2px 6px; border-radius: 3px; font-family: monospace; border-bottom: 2px solid #111; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="room-info">Room: <span id="current-room-name">...</span></div>
        <div id="crosshair">
            <div class="ch-line" id="ch-top"></div>
            <div class="ch-line" id="ch-bottom"></div>
            <div class="ch-line" id="ch-left"></div>
            <div class="ch-line" id="ch-right"></div>
            <div id="ch-center"></div>
        </div>
        <div id="ammo-counter">30 / 90</div>
        <div id="health-container">
            <div id="health-bar"></div>
            <div id="health-text">100 HP</div>
        </div>
    </div>

    <div id="death-screen">Wasted</div>

    <div id="main-menu" class="overlay">
        <h1>Assault Range</h1>
        <div class="menu-box">
            <h3>Create a Room</h3>
            <div class="input-group">
                <input type="text" id="new-room-input" placeholder="Enter Room Name...">
                <button class="btn" id="create-room-btn">Create</button>
            </div>
            <h3>Active Servers</h3>
            <div class="server-list" id="server-list"></div>
        </div>
    </div>

    <div id="pause-menu" class="overlay">
        <div class="menu-box">
            <h2>Game Paused</h2>
            <div class="data-row">Room: <span id="pause-room-display">...</span></div>
            <div class="data-row">Players: <span id="pause-players-display">1</span></div>
            <p style="color:#aaa; font-size:0.9rem; margin-bottom:20px;">
                <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> Move • <kbd>L/R Click</kbd> Fire/Aim • <kbd>R</kbd> Reload
            </p>
            <button class="btn" id="resume-btn" style="background:#00ffcc; color:#000;">Resume Game</button>
            <button class="btn" id="leave-btn">Leave Room</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';
        import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.7;
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(-10, 20, 10);
        scene.add(dirLight);

        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#3a3f44'; ctx.fillRect(0,0,512,512);
        ctx.fillStyle = '#4a5056'; ctx.fillRect(0,0,256,256); ctx.fillRect(256,256,256,256);
        const floorTex = new THREE.CanvasTexture(canvas);
        floorTex.wrapS = THREE.RepeatWrapping; floorTex.wrapT = THREE.RepeatWrapping;
        floorTex.repeat.set(40, 40);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const envGroup = new THREE.Group();
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
        function createWall(w, h, d, x, y, z) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            wall.position.set(x, y, z);
            envGroup.add(wall);
        }
        createWall(50, 10, 1, 0, 5, -25); 
        createWall(50, 10, 1, 0, 5, 25);  
        createWall(1, 10, 50, -25, 5, 0); 
        createWall(1, 10, 50, 25, 5, 0);  
        scene.add(envGroup);

        const gunGroup = new THREE.Group();
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.7 });
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.2 });

        const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.4), gunMat);
        gunGroup.add(receiver);

        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.35, 12), metalMat);
        barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.02, -0.35); gunGroup.add(barrel);

        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.08), darkMat);
        grip.rotation.x = -Math.PI / 10; grip.position.set(0, -0.12, 0.12); gunGroup.add(grip);

        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.1), darkMat);
        mag.rotation.x = Math.PI / 16; mag.position.set(0, -0.12, -0.05); gunGroup.add(mag);

        const stock = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.25), gunMat);
        stock.position.set(0, -0.02, 0.3); gunGroup.add(stock);

        const sightFront = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.04, 0.01), darkMat);
        sightFront.position.set(0, 0.08, -0.45); gunGroup.add(sightFront);
        
        const sightBack = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.02), darkMat);
        sightBack.position.set(0, 0.07, 0.1); gunGroup.add(sightBack);

        const flashCanvas = document.createElement('canvas');
        flashCanvas.width = 128; flashCanvas.height = 128;
        const fCtx = flashCanvas.getContext('2d');
        const gradient = fCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
        gradient.addColorStop(0.2, 'rgba(255, 200, 50, 0.8)');
        gradient.addColorStop(1, 'rgba(255, 100, 0, 0)');
        fCtx.fillStyle = gradient; fCtx.fillRect(0, 0, 128, 128);
        const flashTex = new THREE.CanvasTexture(flashCanvas);

        const flashSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: flashTex, blending: THREE.AdditiveBlending, transparent: true, opacity: 0 }));
        flashSprite.scale.set(0.4, 0.4, 0.4); flashSprite.position.set(0, 0.02, -0.55); 
        gunGroup.add(flashSprite);

        const flashLight = new THREE.PointLight(0xffaa00, 0, 5);
        flashLight.position.copy(flashSprite.position); gunGroup.add(flashLight);

        const hipPosition = new THREE.Vector3(0.25, -0.25, -0.4);
        const adsPosition = new THREE.Vector3(0, -0.12, -0.3); 
        
        // This variable tracks the base visual position of the gun before bob and recoil
        const currentGunBasePos = new THREE.Vector3().copy(hipPosition);

        camera.add(gunGroup);

        const tracerMat = new THREE.MeshBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const tracerGeo = new THREE.CylinderGeometry(0.005, 0.005, 1, 4); tracerGeo.rotateX(Math.PI / 2);
        
        function createTracer(start, end) {
            const distance = start.distanceTo(end);
            const tracer = new THREE.Mesh(tracerGeo, tracerMat);
            tracer.position.copy(start).lerp(end, 0.5); tracer.lookAt(end); tracer.scale.z = distance;
            scene.add(tracer);
            let opacity = 0.8;
            const fade = setInterval(() => { opacity -= 0.1; tracer.material.opacity = opacity; if (opacity <= 0) { clearInterval(fade); scene.remove(tracer); } }, 16);
        }

        const bulletHoles = [];
        const holeGeo = new THREE.CircleGeometry(0.03, 8);
        const holeMat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.9, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -4, polygonOffsetUnits: -4 });
        
        function createBulletHole(intersection) {
            const hole = new THREE.Mesh(holeGeo, holeMat);
            hole.position.copy(intersection.point);
            const normalMatrix = new THREE.Matrix3().getNormalMatrix(intersection.object.matrixWorld);
            const worldNormal = intersection.face.normal.clone().applyMatrix3(normalMatrix).normalize();
            hole.lookAt(hole.position.clone().add(worldNormal));
            hole.position.addScaledVector(worldNormal, 0.002);
            scene.add(hole); bulletHoles.push(hole);

            const spark = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 0.1), new THREE.MeshBasicMaterial({ map: flashTex, transparent: true, opacity: 1, blending: THREE.AdditiveBlending }));
            spark.position.copy(hole.position); spark.lookAt(camera.position); scene.add(spark);
            setTimeout(() => { scene.remove(spark); spark.geometry.dispose(); spark.material.dispose(); }, 50);

            if (bulletHoles.length > 100) { scene.remove(bulletHoles.shift()); }
        }

        const socket = io(); 
        const players = {}; 
        const crosshair = document.getElementById('crosshair');
        const ammoCounter = document.getElementById('ammo-counter');
        const deathScreen = document.getElementById('death-screen');
        
        let inGame = false;
        let myHealth = 100;

        const controls = new PointerLockControls(camera, document.body);

        controls.addEventListener('unlock', () => {
            document.getElementById('ui-layer').style.display = 'none';
            isShooting = false; isAiming = false;
            if (inGame) {
                document.getElementById('pause-menu').style.display = 'flex';
                document.getElementById('pause-players-display').innerText = Object.keys(players).length + 1; 
            } else { document.getElementById('main-menu').style.display = 'flex'; }
        });

        function updateMyHealth(hp) {
            myHealth = hp;
            document.getElementById('health-bar').style.width = `${hp}%`;
            document.getElementById('health-text').innerText = `${hp} HP`;
            document.getElementById('health-bar').style.background = hp <= 30 ? '#ff4655' : '#00ffcc';
        }

        function enterGame(roomName) {
            if (!roomName.trim()) return;
            socket.emit('joinRoom', roomName);
            document.getElementById('current-room-name').innerText = roomName;
            inGame = true; updateMyHealth(100); ammo = maxAmmo; updateAmmoUI();
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            controls.lock(); 
        }

        document.getElementById('create-room-btn').addEventListener('click', () => enterGame(document.getElementById('new-room-input').value));
        document.getElementById('resume-btn').addEventListener('click', () => {
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            controls.lock();
        });
        
        document.getElementById('leave-btn').addEventListener('click', () => {
            socket.emit('leaveRoom'); inGame = false;
            for (let id in players) { scene.remove(players[id]); delete players[id]; }
            camera.position.set(0, 1.7, 0);
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        });

        socket.on('availableRooms', (rooms) => {
            const list = document.getElementById('server-list');
            if (rooms.length === 0) { list.innerHTML = '<p style="color: #888; text-align: center;">No active rooms.</p>'; return; }
            list.innerHTML = '';
            rooms.forEach(room => {
                const div = document.createElement('div'); div.className = 'server-item';
                div.innerHTML = `<span><strong>${room.name}</strong> (${room.players})</span><button class="btn join-btn">Join</button>`;
                div.querySelector('.join-btn').addEventListener('click', () => enterGame(room.name));
                list.appendChild(div);
            });
        });

        function buildPlayerModel(id, color) {
            const group = new THREE.Group(); group.userData = { id: id }; 
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.0, 1.2), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 1.0; group.add(body);
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            visor.position.set(0, 1.6, -0.5); group.add(visor);
            return group;
        }

        socket.on('currentPlayers', (serverPlayers) => {
            for (let id in players) { scene.remove(players[id]); delete players[id]; } 
            for (let id in serverPlayers) {
                if (id === socket.id) { updateMyHealth(serverPlayers[id].health); continue; }
                const pModel = buildPlayerModel(serverPlayers[id].id, serverPlayers[id].color);
                pModel.position.copy(serverPlayers[id].position); pModel.rotation.y = serverPlayers[id].rotation.y;
                scene.add(pModel); players[serverPlayers[id].id] = pModel;
            }
        });

        socket.on('newPlayer', (p) => {
            const pModel = buildPlayerModel(p.id, p.color); pModel.position.copy(p.position); pModel.rotation.y = p.rotation.y;
            scene.add(pModel); players[p.id] = pModel;
        });

        socket.on('playerMoved', (p) => { if (players[p.id]) { players[p.id].position.copy(p.position); players[p.id].rotation.y = p.rotation.y; } });
        socket.on('playerDisconnected', (id) => { if (players[id]) { scene.remove(players[id]); delete players[id]; } });
        socket.on('updateHealth', (data) => { if (data.id === socket.id) updateMyHealth(data.health); });

        socket.on('youDied', () => {
            deathScreen.style.opacity = '1'; setTimeout(() => { deathScreen.style.opacity = '0'; }, 1500);
            updateMyHealth(100); ammo = maxAmmo; updateAmmoUI(); velocity.set(0,0,0); camera.position.set(0, 1.7, 0);
        });

        socket.on('playerRespawned', (data) => { if (data.id !== socket.id && players[data.id]) players[data.id].position.copy(data.position); });

        socket.on('drawLaser', (data) => {
            if (players[data.fromId]) {
                const fromPos = new THREE.Vector3().copy(players[data.fromId].position); fromPos.y += 1.5; 
                createTracer(fromPos, data.toPosition);
            }
        });

        const raycaster = new THREE.Raycaster();
        const FIRE_RATE = 0.09; 
        let lastFireTime = 0, shotCount = 0, recoilRecoveryTimer = 0;
        let isShooting = false, isAiming = false, isReloading = false;
        let ammo = 30; const maxAmmo = 30;

        const gunRecoilOffset = new THREE.Vector3();
        const gunRecoilRot = new THREE.Euler();

        function updateAmmoUI() {
            ammoCounter.innerText = `${ammo} / 90`;
            ammoCounter.style.color = (ammo === 0 && !isReloading) ? '#ff4655' : 'white';
        }

        function reload() {
            if (isReloading || ammo === maxAmmo || !inGame) return;
            isReloading = true;
            isAiming = false; 
            
            // Drop gun manually for reload animation
            gunGroup.rotation.x = -0.5; 
            setTimeout(() => { ammo = maxAmmo; isReloading = false; updateAmmoUI(); }, 1500);
        }

        function getSprayNDC(index) {
            let x = 0, y = 0;
            const maxVertical = 0.055; 
            y = Math.min(index * 0.007, maxVertical);
            if (index > 4) {
                const phase = (index - 4) * 0.4;
                const amplitude = Math.min((index - 4) * 0.003, 0.035);
                x = Math.sin(phase) * amplitude;
            }
            const multiplier = isAiming ? 0.4 : 1.0;
            return new THREE.Vector2(x * multiplier, y * multiplier);
        }

        function fireBullet() {
            if (ammo <= 0 || isReloading || myHealth <= 0) return;
            ammo--; updateAmmoUI(); shotCount++;

            flashSprite.material.opacity = 1; flashLight.intensity = 2;
            
            gunRecoilOffset.z = 0.12; 
            gunRecoilRot.x = 0.15; 

            const viewKick = isAiming ? 0.003 : 0.006;
            const euler = new THREE.Euler(0, 0, 0, 'YXZ');
            euler.setFromQuaternion(camera.quaternion);
            euler.x += viewKick;
            euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x));
            camera.quaternion.setFromEuler(euler);

            const sprayNDC = getSprayNDC(shotCount);
            raycaster.setFromCamera(sprayNDC, camera);

            if (!isAiming) {
                const spreadPixels = (sprayNDC.y + Math.abs(sprayNDC.x)) * 1000 + 14;
                document.getElementById('ch-top').style.transform = `translateY(-${spreadPixels}px)`;
                document.getElementById('ch-bottom').style.transform = `translateY(${spreadPixels}px)`;
                document.getElementById('ch-left').style.transform = `translateX(-${spreadPixels}px)`;
                document.getElementById('ch-right').style.transform = `translateX(${spreadPixels}px)`;
            }

            const hitTargets = [floor, ...envGroup.children];
            for (let id in players) { hitTargets.push(players[id]); }

            const intersects = raycaster.intersectObjects(hitTargets, true);
            const barrelWorldPos = new THREE.Vector3(); flashSprite.getWorldPosition(barrelWorldPos);
            let hitPoint;

            if (intersects.length > 0) {
                hitPoint = intersects[0].point;
                let rootObject = intersects[0].object;

                if (rootObject === floor || envGroup.children.includes(rootObject)) {
                    createBulletHole(intersects[0]);
                } else {
                    while (rootObject.parent && rootObject.userData.id === undefined) rootObject = rootObject.parent;
                    if (rootObject.userData.id) socket.emit('registerHit', { targetId: rootObject.userData.id });
                }
                createTracer(barrelWorldPos, hitPoint);
            } else {
                hitPoint = raycaster.ray.origin.clone().addScaledVector(raycaster.ray.direction, 100);
                createTracer(barrelWorldPos, hitPoint);
            }
            socket.emit('playerShot', { hitPoint: hitPoint });

            // Auto-Reload if empty
            if (ammo === 0) reload(); 
        }

        document.addEventListener('contextmenu', (e) => e.preventDefault()); 

        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked || !inGame) return;
            if (e.button === 0) {
                isShooting = true;
                if (ammo === 0) reload();
            }
            if (e.button === 2 && !isReloading) isAiming = true; 
        });
        
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                isShooting = false;
                document.getElementById('ch-top').style.transform = `translateY(0)`;
                document.getElementById('ch-bottom').style.transform = `translateY(0)`;
                document.getElementById('ch-left').style.transform = `translateX(0)`;
                document.getElementById('ch-right').style.transform = `translateX(0)`;
            }
            if (e.button === 2) isAiming = false;
        });

        const keys = { w: false, a: false, s: false, d: false };
        let canJump = false;
        document.addEventListener('keydown', (e) => {
            if (!controls.isLocked) return;
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
            if (key === 'r') reload();
            if (e.code === 'Space' && canJump) { velocity.y = 12; canJump = false; }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        const moveSpeed = 50.0;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            if (isShooting && !isReloading && controls.isLocked) {
                if (time / 1000 - lastFireTime > FIRE_RATE) {
                    fireBullet(); lastFireTime = time / 1000; recoilRecoveryTimer = 0;
                }
            } else {
                recoilRecoveryTimer += delta;
                if (recoilRecoveryTimer > 0.15) shotCount = Math.max(0, shotCount - delta * 25); 
            }

            // --- FIXED ANIMATION & RELOAD MATH ---
            crosshair.style.opacity = isAiming ? '0' : '0.8';
            
            // If reloading, force the target position back to hip
            const targetGunPos = (isAiming && !isReloading) ? adsPosition : hipPosition;
            currentGunBasePos.lerp(targetGunPos, 0.15); // Smoothly transitions the base position
            
            gunRecoilOffset.lerp(new THREE.Vector3(0,0,0), 0.15); 
            gunRecoilRot.x *= 0.8; 

            if (flashSprite.material.opacity > 0) {
                flashSprite.material.opacity -= delta * 15;
                flashLight.intensity -= delta * 30;
            }

            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 35.0 * delta; 

            let isMoving = false;
            if (controls.isLocked) {
                direction.z = Number(keys.w) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize(); 

                const speed = isAiming ? moveSpeed * 0.5 : moveSpeed; 
                if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                
                isMoving = direction.x !== 0 || direction.z !== 0;
            }

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            camera.position.y += (velocity.y * delta);

            if (camera.position.y < 1.7) { velocity.y = 0; camera.position.y = 1.7; canJump = true; }

            let bobX = 0, bobY = 0;
            if (isMoving && !isReloading && canJump && !isAiming) {
                bobX = Math.cos(time * 0.006) * 0.005;
                bobY = Math.sin(time * 0.012) * 0.01;
            }

            // Always update position so it lowers smoothly during reload
            gunGroup.position.copy(currentGunBasePos);
            gunGroup.position.add(new THREE.Vector3(bobX + gunRecoilOffset.x, bobY + gunRecoilOffset.y, gunRecoilOffset.z));

            // Let the reload function control rotation when active
            if (!isReloading) {
                gunGroup.rotation.set(gunRecoilRot.x, gunRecoilRot.y, gunRecoilRot.z);
            }

            if (inGame && controls.isLocked) {
                const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                const pureYaw = Math.atan2(-camDir.x, -camDir.z); 
                socket.emit('playerMovement', { position: { x: camera.position.x, y: camera.position.y - 1.7, z: camera.position.z }, rotation: { y: pureYaw } });
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
